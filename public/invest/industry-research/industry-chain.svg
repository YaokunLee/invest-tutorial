<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">AI 产业链示意图</title>
  <desc id="desc">把 AI 产业链拆成上游、中游、下游，并标注每一环的典型公司和研究重点。</desc>
  <rect width="1200" height="520" fill="#f8fafc"/>
  <text x="600" y="52" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="30" font-weight="700" fill="#0f172a">先画产业链：钱从哪里来，利润流向哪里</text>
  <text x="600" y="86" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="16" fill="#475569">以 AI 算力为例：同一个大趋势里，不同环节的定价权和风险完全不同</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="72" y="138" width="288" height="300" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="456" y="138" width="288" height="300" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="840" y="138" width="288" height="300" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
  </g>

  <text x="216" y="178" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="24" font-weight="700" fill="#1d4ed8">上游</text>
  <text x="600" y="178" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="24" font-weight="700" fill="#047857">中游</text>
  <text x="984" y="178" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="24" font-weight="700" fill="#b45309">下游</text>

  <text x="216" y="216" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" font-weight="700" fill="#0f172a">设备、制造、关键零部件</text>
  <text x="216" y="254" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="16" fill="#334155">ASML / TSMC / HBM</text>
  <text x="216" y="284" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="16" fill="#334155">半导体设备 / 封装 / 供应链</text>
  <line x1="122" y1="318" x2="310" y2="318" stroke="#dbeafe" stroke-width="2"/>
  <text x="216" y="354" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="16" font-weight="700" fill="#1e3a8a">研究重点</text>
  <text x="216" y="386" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="15" fill="#475569">产能、良率、资本开支</text>
  <text x="216" y="414" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="15" fill="#475569">谁最难被替代</text>

  <text x="600" y="216" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" font-weight="700" fill="#0f172a">芯片、服务器、平台能力</text>
  <text x="600" y="254" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="16" fill="#334155">NVIDIA / AMD / Broadcom</text>
  <text x="600" y="284" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="16" fill="#334155">服务器厂商 / 网络设备</text>
  <line x1="506" y1="318" x2="694" y2="318" stroke="#dcfce7" stroke-width="2"/>
  <text x="600" y="354" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="16" font-weight="700" fill="#065f46">研究重点</text>
  <text x="600" y="386" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="15" fill="#475569">毛利率、产品迭代、生态</text>
  <text x="600" y="414" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="15" fill="#475569">客户是否自研替代</text>

  <text x="984" y="216" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="18" font-weight="700" fill="#0f172a">云厂商、模型公司、企业客户</text>
  <text x="984" y="254" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="16" fill="#334155">Microsoft / Google / Amazon</text>
  <text x="984" y="284" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="16" fill="#334155">Meta / OpenAI / 企业应用</text>
  <line x1="890" y1="318" x2="1078" y2="318" stroke="#fed7aa" stroke-width="2"/>
  <text x="984" y="354" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="16" font-weight="700" fill="#92400e">研究重点</text>
  <text x="984" y="386" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="15" fill="#475569">CapEx 能持续多久</text>
  <text x="984" y="414" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="15" fill="#475569">AI 投入能否变成收入</text>

  <line x1="374" y1="288" x2="430" y2="288" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="758" y1="288" x2="814" y2="288" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="600" y="482" text-anchor="middle" font-family="Arial, 'PingFang SC', sans-serif" font-size="17" font-weight="700" fill="#0f172a">关键问题：不是“AI 行业大不大”，而是“产业链里谁最有定价权，谁能留下自由现金流”。</text>
</svg>
